# uMTP-Responder config for ZeroCD
# Will be copied to /etc/umtprd/umtprd.conf during installation

loop_on_disconnect 0

# Storage: ISO directory (read-write for MTP file transfer)
storage "/mnt/iso_storage" "ISO Storage" "rw"

# USB strings
manufacturer "ZeroCD"
product "ZeroCD MTP Device"
serial "0123456789"

firmware_version "1.0"
mtp_extensions "microsoft.com: 1.0; android.com: 1.0;"

interface "MTP"

# USB IDs (Linux Foundation PTP Gadget)
usb_vendor_id 0x1D6B
usb_product_id 0x0100
usb_class 0x6
usb_subclass 0x1
usb_protocol 0x1

usb_dev_version 0x3008

# inotify support enabled (for async file change events)
# no_inotify 0x1

# Sync when close (prevent data loss on sudden disconnect)
sync_when_close 0x1

# FunctionFS mode (required for Raspberry Pi Zero)
usb_functionfs_mode 0x1

# USB endpoints
usb_dev_path "/dev/ffs-mtp/ep0"
usb_epin_path "/dev/ffs-mtp/ep1"
usb_epout_path "/dev/ffs-mtp/ep2"
usb_epint_path "/dev/ffs-mtp/ep3"

usb_max_packet_size 0x200